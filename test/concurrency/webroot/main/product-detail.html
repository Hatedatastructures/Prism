<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 优品商城</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="/">
                    <span class="logo-text">优品商城</span>
                </a>
            </div>
            <nav class="nav">
                <a href="/" class="nav-item">首页</a>
                <a href="/products" class="nav-item">全部商品</a>
                <a href="/products?category=electronics" class="nav-item">数码电子</a>
                <a href="/products?category=clothing" class="nav-item">服装鞋包</a>
                <a href="/products?category=home" class="nav-item">家居生活</a>
            </nav>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" placeholder="搜索商品..." id="searchInput">
                    <button onclick="handleSearch()">搜索</button>
                </div>
                <div class="user-actions">
                    <a href="/cart" class="cart-link">
                        <span class="cart-icon">🛒</span>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                    <a href="/user-center.html" class="user-link">👤</a>
                </div>
            </div>
        </div>
    </header>

    <main class="product-detail-page">
        <div class="container">
            <!-- 面包屑导航 -->
            <nav class="breadcrumb">
                <a href="/">首页</a> >
                <a href="/products">商品列表</a> >
                <span id="productName">商品名称</span>
            </nav>

            <div class="product-main">
                <!-- 商品图片 -->
                <div class="product-gallery">
                    <div class="main-image">
                        <img id="mainImage" src="" alt="商品图片">
                    </div>
                </div>

                <!-- 商品信息 -->
                <div class="product-info">
                    <h1 class="product-title" id="productTitle">加载中...</h1>
                    <p class="product-subtitle" id="productSubtitle"></p>

                    <div class="price-section">
                        <span class="current-price">¥<span id="currentPrice">0.00</span></span>
                        <span class="original-price">¥<span id="originalPrice">0.00</span></span>
                    </div>

                    <div class="sales-info">
                        <span>销量: <span id="salesCount">0</span></span>
                        <span>库存: <span id="stockCount">0</span></span>
                        <span>好评率: <span id="rating">0</span>%</span>
                    </div>

                    <!-- 数量选择 -->
                    <div class="quantity-section">
                        <span>数量:</span>
                        <div class="quantity-selector">
                            <button onclick="decreaseQty()">-</button>
                            <input type="number" value="1" min="1" id="quantity">
                            <button onclick="increaseQty()">+</button>
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="action-buttons">
                        <button class="btn-add-cart" onclick="addToCartFromDetail()">加入购物车</button>
                        <button class="btn-buy-now" onclick="buyNow()">立即购买</button>
                    </div>
                </div>
            </div>

            <!-- 商品详情标签页 -->
            <div class="product-tabs">
                <div class="tab-headers">
                    <button class="tab-btn active" data-tab="detail" onclick="switchTab('detail')">商品详情</button>
                    <button class="tab-btn" data-tab="specs" onclick="switchTab('specs')">规格参数</button>
                    <button class="tab-btn" data-tab="reviews" onclick="switchTab('reviews')">用户评价</button>
                </div>
                <div class="tab-content">
                    <div class="tab-panel active" id="detail">
                        <div id="detailContent">商品详情加载中...</div>
                    </div>
                    <div class="tab-panel" id="specs">
                        <table class="specs-table" id="specsTable"></table>
                    </div>
                    <div class="tab-panel" id="reviews">
                        <div id="reviewsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="/login.html">登录</a>
                <a href="/register.html">注册</a>
                <a href="/about">关于我们</a>
                <a href="/contact">联系我们</a>
            </div>
            <p class="copyright">© 2024 优品商城 版权所有</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            if (productId) {
                loadProductDetail(productId);
            } else {
                document.getElementById('productTitle').textContent = '商品不存在';
            }
        });
    </script>
</body>
</html>
