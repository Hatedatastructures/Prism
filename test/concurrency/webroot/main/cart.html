<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 优品商城</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/cart.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="/">
                    <span class="logo-text">优品商城</span>
                </a>
            </div>
            <nav class="nav">
                <a href="/" class="nav-item">首页</a>
                <a href="/products" class="nav-item">全部商品</a>
                <a href="/products?category=electronics" class="nav-item">数码电子</a>
                <a href="/products?category=clothing" class="nav-item">服装鞋包</a>
                <a href="/products?category=home" class="nav-item">家居生活</a>
            </nav>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" placeholder="搜索商品..." id="searchInput">
                    <button onclick="handleSearch()">搜索</button>
                </div>
                <div class="user-actions">
                    <a href="/cart" class="cart-link">
                        <span class="cart-icon">🛒</span>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                    <a href="/user-center.html" class="user-link">👤</a>
                </div>
            </div>
        </div>
    </header>

    <main class="cart-page">
        <div class="container">
            <h1>我的购物车</h1>

            <div class="cart-content" id="cartContent">
                <!-- 购物车列表 -->
                <div class="cart-list">
                    <div class="cart-header">
                        <label class="select-all">
                            <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                            <span>全选</span>
                        </label>
                        <span class="col-product">商品信息</span>
                        <span class="col-price">单价</span>
                        <span class="col-quantity">数量</span>
                        <span class="col-subtotal">小计</span>
                        <span class="col-action">操作</span>
                    </div>
                    <div id="cartItems">
                        <div class="loading">加载中...</div>
                    </div>
                </div>

                <!-- 结算栏 -->
                <div class="cart-footer">
                    <div class="footer-left">
                        <label class="select-all">
                            <input type="checkbox" id="selectAllBottom" onchange="toggleSelectAll()">
                            <span>全选</span>
                        </label>
                        <button class="btn-delete-selected" onclick="deleteSelected()">删除选中</button>
                    </div>
                    <div class="footer-right">
                        <span class="selected-count">已选 <span id="selectedCount">0</span> 件</span>
                        <span class="total-price">合计: <span class="price">¥<span id="totalPrice">0.00</span></span></span>
                        <button class="btn-checkout" onclick="goToCheckout()">去结算</button>
                    </div>
                </div>
            </div>

            <!-- 空购物车 -->
            <div class="empty-cart" id="emptyCart" style="display: none;">
                <div class="empty-icon">🛒</div>
                <p>购物车还是空的</p>
                <a href="/products" class="btn-continue">去逛逛</a>
            </div>
        </div>
    </main>

    <!-- 底部 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="/login.html">登录</a>
                <a href="/register.html">注册</a>
                <a href="/about">关于我们</a>
                <a href="/contact">联系我们</a>
            </div>
            <p class="copyright">© 2024 优品商城 版权所有</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/cart.js"></script>
</body>
</html>
