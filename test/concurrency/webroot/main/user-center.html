<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 - 优品商城</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/user.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="/">
                    <span class="logo-text">优品商城</span>
                </a>
            </div>
            <nav class="nav">
                <a href="/" class="nav-item">首页</a>
                <a href="/products" class="nav-item">全部商品</a>
                <a href="/products?category=electronics" class="nav-item">数码电子</a>
                <a href="/products?category=clothing" class="nav-item">服装鞋包</a>
                <a href="/products?category=home" class="nav-item">家居生活</a>
            </nav>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" placeholder="搜索商品..." id="searchInput">
                    <button onclick="handleSearch()">搜索</button>
                </div>
                <div class="user-actions">
                    <a href="/cart" class="cart-link">
                        <span class="cart-icon">🛒</span>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                    <a href="/user-center.html" class="user-link">👤</a>
                </div>
            </div>
        </div>
    </header>

    <main class="user-center-page">
        <div class="container">
            <div class="user-center-content">
                <!-- 侧边栏 -->
                <aside class="user-sidebar">
                    <div class="user-info-card">
                        <div class="user-avatar">👤</div>
                        <div class="user-name">用户名</div>
                        <div class="user-level">普通会员</div>
                    </div>
                    <nav class="user-nav">
                        <a href="/user-center.html?tab=orders" class="nav-item active">我的订单</a>
                        <a href="/user-center.html?tab=address" class="nav-item">收货地址</a>
                        <a href="/user-center.html?tab=profile" class="nav-item">个人信息</a>
                        <a href="/user-center.html?tab=security" class="nav-item">账户安全</a>
                        <a href="/user-center.html?tab=wishlist" class="nav-item">我的收藏</a>
                        <a href="/login.html" class="nav-item logout">退出登录</a>
                    </nav>
                </aside>

                <!-- 主内容区 -->
                <div class="user-main">
                    <!-- 订单列表 -->
                    <div class="user-section active" id="orders-section">
                        <h2>我的订单</h2>
                        <div class="order-tabs">
                            <button class="order-tab active" data-status="all">全部订单</button>
                            <button class="order-tab" data-status="pending">待付款</button>
                            <button class="order-tab" data-status="shipped">待收货</button>
                            <button class="order-tab" data-status="completed">已完成</button>
                        </div>
                        <div id="orderList">
                            <div class="empty-orders">
                                <div class="empty-icon">📦</div>
                                <p>暂无订单</p>
                                <a href="/products" class="btn-shop">去购物</a>
                            </div>
                        </div>
                    </div>

                    <!-- 收货地址 -->
                    <div class="user-section" id="address-section">
                        <h2>收货地址</h2>
                        <button class="btn-add-address">+ 添加新地址</button>
                        <div class="address-list">
                            <div class="address-item">
                                <div class="address-header">
                                    <span class="name">张三</span>
                                    <span class="phone">138****8888</span>
                                    <span class="default-tag">默认</span>
                                </div>
                                <div class="address-detail">北京市朝阳区建国路88号</div>
                                <div class="address-actions">
                                    <button class="btn-edit">编辑</button>
                                    <button class="btn-delete">删除</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 个人信息 -->
                    <div class="user-section" id="profile-section">
                        <h2>个人信息</h2>
                        <form class="profile-form">
                            <div class="form-group">
                                <label>用户名</label>
                                <input type="text" value="user123" disabled>
                            </div>
                            <div class="form-group">
                                <label>昵称</label>
                                <input type="text" value="用户昵称">
                            </div>
                            <div class="form-group">
                                <label>邮箱</label>
                                <input type="email" value="user@example.com">
                            </div>
                            <div class="form-group">
                                <label>手机号</label>
                                <input type="tel" value="138****8888">
                            </div>
                            <div class="form-group">
                                <label>性别</label>
                                <select>
                                    <option value="male">男</option>
                                    <option value="female">女</option>
                                    <option value="other">保密</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-save">保存修改</button>
                        </form>
                    </div>

                    <!-- 账户安全 -->
                    <div class="user-section" id="security-section">
                        <h2>账户安全</h2>
                        <div class="security-items">
                            <div class="security-item">
                                <div class="security-info">
                                    <div class="security-title">登录密码</div>
                                    <div class="security-desc">为了您的账户安全，建议定期更换密码</div>
                                </div>
                                <button class="btn-modify">修改密码</button>
                            </div>
                            <div class="security-item">
                                <div class="security-info">
                                    <div class="security-title">手机验证</div>
                                    <div class="security-desc">已绑定手机: 138****8888</div>
                                </div>
                                <button class="btn-modify">更换手机</button>
                            </div>
                            <div class="security-item">
                                <div class="security-info">
                                    <div class="security-title">邮箱验证</div>
                                    <div class="security-desc">已绑定邮箱: user@example.com</div>
                                </div>
                                <button class="btn-modify">更换邮箱</button>
                            </div>
                        </div>
                    </div>

                    <!-- 我的收藏 -->
                    <div class="user-section" id="wishlist-section">
                        <h2>我的收藏</h2>
                        <div id="wishlistList">
                            <div class="empty-wishlist">
                                <div class="empty-icon">❤️</div>
                                <p>暂无收藏商品</p>
                                <a href="/products" class="btn-shop">去逛逛</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="/login.html">登录</a>
                <a href="/register.html">注册</a>
                <a href="/about">关于我们</a>
                <a href="/contact">联系我们</a>
            </div>
            <p class="copyright">© 2024 优品商城 版权所有</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/user.js"></script>
</body>
</html>
