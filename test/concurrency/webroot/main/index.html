<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>优品商城 - 品质生活，从这里开始</title>
    <link rel="stylesheet" href="/css/main.css">
</head>

<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="/">
                    <span class="logo-text">优品商城</span>
                </a>
            </div>
            <nav class="nav">
                <a href="/" class="nav-item active">首页</a>
                <a href="/products" class="nav-item">全部商品</a>
                <a href="/products?category=electronics" class="nav-item">数码电子</a>
                <a href="/products?category=clothing" class="nav-item">服装鞋包</a>
                <a href="/products?category=home" class="nav-item">家居生活</a>
            </nav>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" placeholder="搜索商品..." id="searchInput">
                    <button onclick="handleSearch()">搜索</button>
                </div>
                <div class="user-actions">
                    <a href="/cart" class="cart-link">
                        <span class="cart-icon">🛒</span>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>
                    <a href="/user-center.html" class="user-link">👤</a>
                </div>
            </div>
        </div>
    </header>

    <!-- 轮播图区域 -->
    <section class="banner-section">
        <div class="container">
            <div class="banner-slider" id="bannerSlider">
                <div class="banner-item active">
                    <div class="banner-content">
                        <h2>🔥 新品上市</h2>
                        <p>探索最新科技产品，享受品质生活</p>
                        <a href="/products?tag=new" class="btn-primary">立即查看</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 分类导航 -->
    <section class="category-section">
        <div class="container">
            <div class="category-grid">
                <a href="/products?category=electronics" class="category-card">
                    <div class="category-icon">📱</div>
                    <span>数码电子</span>
                </a>
                <a href="/products?category=clothing" class="category-card">
                    <div class="category-icon">👕</div>
                    <span>服装鞋包</span>
                </a>
                <a href="/products?category=home" class="category-card">
                    <div class="category-icon">🏠</div>
                    <span>家居生活</span>
                </a>
                <a href="/products?category=beauty" class="category-card">
                    <div class="category-icon">💄</div>
                    <span>美妆护肤</span>
                </a>
                <a href="/products?category=food" class="category-card">
                    <div class="category-icon">🍎</div>
                    <span>食品生鲜</span>
                </a>
                <a href="/products?category=sports" class="category-card">
                    <div class="category-icon">⚽</div>
                    <span>运动户外</span>
                </a>
            </div>
        </div>
    </section>

    <!-- 热门商品 -->
    <section class="hot-products-section">
        <div class="container">
            <div class="section-header">
                <h2>🔥 热门商品</h2>
                <a href="/products?sort=hot" class="view-more">查看更多 ></a>
            </div>
            <div class="product-grid" id="hotProducts">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </section>

    <!-- 新品推荐 -->
    <section class="new-products-section">
        <div class="container">
            <div class="section-header">
                <h2>✨ 新品推荐</h2>
                <a href="/products?tag=new" class="view-more">查看更多 ></a>
            </div>
            <div class="product-grid" id="newProducts">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </section>

    <!-- 底部 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="/login.html">登录</a>
                <a href="/register.html">注册</a>
                <a href="/about">关于我们</a>
                <a href="/contact">联系我们</a>
            </div>
            <p class="copyright">© 2024 优品商城 版权所有</p>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            loadProducts('/api/products?sort=hot', 'hotProducts');
            loadProducts('/api/products?tag=new', 'newProducts');
            updateCartCount();
        });
    </script>
</body>

</html>
