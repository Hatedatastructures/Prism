<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 优品商城</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/user.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="logo-link">
                    <span class="logo-text">优品商城</span>
                </a>
                <h1>用户登录</h1>
            </div>

            <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">用户名/手机号</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名或手机号" required>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span>记住我</span>
                    </label>
                    <a href="/forgot-password.html" class="forgot-password">忘记密码？</a>
                </div>

                <button type="submit" class="btn-auth">登录</button>
            </form>

            <div class="auth-footer">
                <span>还没有账号？</span>
                <a href="/register.html">立即注册</a>
            </div>

            <div class="auth-divider">
                <span>其他登录方式</span>
            </div>

            <div class="social-login">
                <button class="social-btn wechat">
                    <span class="icon">💚</span>
                    <span>微信登录</span>
                </button>
                <button class="social-btn qq">
                    <span class="icon">🐧</span>
                    <span>QQ登录</span>
                </button>
            </div>
        </div>
    </div>

    <script src="/js/user.js"></script>
</body>

</html>
