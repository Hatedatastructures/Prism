<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>502 - 网关错误</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1a;
            --bg-secondary: #0d1424;
            --fg-primary: #e8edf5;
            --fg-muted: #6b7a94;
            --accent: #f59e0b;
            --accent-glow: rgba(245, 158, 11, 0.4);
            --accent-dim: rgba(245, 158, 11, 0.1);
            --border: rgba(107, 122, 148, 0.2);
            --card-bg: rgba(13, 20, 36, 0.6);
            --error-color: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--fg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(245, 158, 11, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(239, 68, 68, 0.06) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        .mouse-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
            z-index: 2;
            opacity: 0.3;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .error-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(120px, 20vw, 200px);
            font-weight: 700;
            line-height: 1;
            color: var(--error-color);
            position: relative;
            margin-bottom: 1.5rem;
            text-shadow:
                0 0 40px var(--accent-glow),
                0 0 80px rgba(245, 158, 11, 0.2);
            animation: glitch 3s ease-in-out infinite;
        }

        .error-code::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, var(--accent-dim) 0%, transparent 70%);
            filter: blur(40px);
            z-index: -1;
        }

        @keyframes glitch {

            0%,
            90%,
            100% {
                opacity: 1;
                transform: scale(1) translateX(0);
            }

            92% {
                opacity: 0.8;
                transform: scale(1.02) translateX(-3px);
            }

            94% {
                opacity: 1;
                transform: scale(0.98) translateX(3px);
            }

            96% {
                opacity: 0.9;
                transform: scale(1.01) translateX(-2px);
            }

            98% {
                opacity: 1;
                transform: scale(1) translateX(0);
            }
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--fg-muted);
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .title {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--fg-primary);
        }

        .description {
            font-size: clamp(1rem, 2.5vw, 1.125rem);
            color: var(--fg-muted);
            line-height: 1.7;
            margin-bottom: 2.5rem;
            max-width: 480px;
            margin-left: auto;
            margin-right: auto;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.75rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background: #fbbf24;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: var(--fg-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2.5rem 0;
            color: var(--fg-muted);
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }

        .info-card {
            padding: 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .info-card:hover {
            border-color: rgba(245, 158, 11, 0.3);
            transform: translateY(-2px);
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border: 1px solid rgba(245, 158, 11, 0.2);
            animation: float 20s ease-in-out infinite;
        }

        .shape-1 {
            width: 60px;
            height: 60px;
            top: 15%;
            left: 10%;
            border-radius: 50%;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 40px;
            height: 40px;
            top: 70%;
            left: 85%;
            transform: rotate(45deg);
            animation-delay: -5s;
        }

        .shape-3 {
            width: 80px;
            height: 80px;
            top: 80%;
            left: 20%;
            border-radius: 10px;
            animation-delay: -10s;
        }

        .shape-4 {
            width: 30px;
            height: 30px;
            top: 20%;
            left: 80%;
            border-radius: 50%;
            animation-delay: -15s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.3;
            }

            25% {
                transform: translateY(-20px) rotate(90deg);
                opacity: 0.6;
            }

            50% {
                transform: translateY(0) rotate(180deg);
                opacity: 0.3;
            }

            75% {
                transform: translateY(20px) rotate(270deg);
                opacity: 0.6;
            }
        }

        /* Server Status Indicator */
        .server-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding: 0.75rem 1.25rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 8px;
            font-size: 0.85rem;
            color: #f87171;
        }

        .server-status svg {
            animation: shake 0.5s ease-in-out infinite;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-2px);
            }

            75% {
                transform: translateX(2px);
            }
        }

        @media (max-width: 480px) {
            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .info-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .error-code,
            .status-dot,
            .shape,
            .server-status svg {
                animation: none;
            }

            .mouse-glow {
                display: none;
            }
        }

        .btn:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas" aria-hidden="true"></canvas>
    <div class="gradient-overlay"></div>
    <div class="mouse-glow" id="mouseGlow"></div>
    <div class="floating-shapes" aria-hidden="true">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>
    <main class="content" role="main">
        <div class="status-badge">
            <span class="status-dot"></span>
            <span>服务器错误</span>
        </div>
        <h1 class="error-code">502</h1>
        <h2 class="title">网关错误</h2>
        <p class="description">
            服务器作为网关或代理，从上游服务器收到了无效响应。这通常是临时性问题，请稍后重试。
        </p>
        <div class="actions">
            <button class="btn btn-primary" onclick="location.reload()" aria-label="刷新页面">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                刷新重试
            </button>
            <a href="/" class="btn btn-secondary" aria-label="返回首页">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                返回首页
            </a>
        </div>
        <div class="server-status">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                <line x1="6" y1="6" x2="6.01" y2="6"></line>
                <line x1="6" y1="18" x2="6.01" y2="18"></line>
            </svg>
            <span>上游服务器无响应</span>
        </div>
        <div class="divider">错误详情</div>
        <div class="info-grid">
            <div class="info-card">
                <div class="info-label">错误代码</div>
                <div class="info-value">502</div>
            </div>
            <div class="info-card">
                <div class="info-label">错误类型</div>
                <div class="info-value">Bad Gateway</div>
            </div>
            <div class="info-card">
                <div class="info-label">时间戳</div>
                <div class="info-value" id="timestamp">--:--:--</div>
            </div>
            <div class="info-card">
                <div class="info-label">请求路径</div>
                <div class="info-value" id="path">/unknown</div>
            </div>
        </div>
    </main>
    <script>
        // Initialize variables first
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const mouseGlow = document.getElementById('mouseGlow');
        const timestampEl = document.getElementById('timestamp');
        const pathEl = document.getElementById('path');
        let width = window.innerWidth;
        let height = window.innerHeight;
        let mouseX = width / 2;
        let mouseY = height / 2;
        let animationId = null;
        const gridSpacing = 60;
        const gridLines = [];
        const particles = [];
        const particleCount = 50;
        let waveOffset = 0;
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initGrid();
        }
        function initGrid() {
            gridLines.length = 0;
            for (let x = 0; x <= width; x += gridSpacing) {
                gridLines.push({ x1: x, y1: 0, x2: x, y2: height, type: 'v' });
            }
            for (let y = 0; y <= height; y += gridSpacing) {
                gridLines.push({ x1: 0, y1: y, x2: width, y2: y, type: 'h' });
            }
        }
        function initParticles() {
            particles.length = 0;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 1,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }
        function drawGrid() {
            waveOffset += 0.02;
            gridLines.forEach((line, i) => {
                const dist = line.type === 'v'
                    ? Math.abs(line.x1 - mouseX)
                    : Math.abs(line.y1 - mouseY);
                const maxDist = 200;
                const intensity = Math.max(0, 1 - dist / maxDist);
                // Add wave distortion for 502
                const wave = Math.sin(waveOffset + i * 0.1) * 0.02;
                ctx.strokeStyle = `rgba(245, 158, 11, ${0.03 + intensity * 0.12 + wave})`;
                ctx.lineWidth = 1 + intensity * 2;
                ctx.beginPath();
                ctx.moveTo(line.x1, line.y1);
                ctx.lineTo(line.x2, line.y2);
                ctx.stroke();
            });
        }
        function drawParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.max(0.5, p.size), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(245, 158, 11, ${p.opacity})`;
                ctx.fill();
            });
        }
        function animate() {
            ctx.clearRect(0, 0, width, height);
            drawGrid();
            drawParticles();
            animationId = requestAnimationFrame(animate);
        }
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseGlow.style.left = mouseX + 'px';
            mouseGlow.style.top = mouseY + 'px';
        }
        function updateTimestamp() {
            const now = new Date();
            timestampEl.textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
        }
        function init() {
            resize();
            initParticles();
            animate();
            pathEl.textContent = window.location.pathname || '/unknown';
            updateTimestamp();
            setInterval(updateTimestamp, 1000);
            window.addEventListener('resize', resize);
            document.addEventListener('mousemove', handleMouseMove);
        }
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
        if (!prefersReducedMotion.matches) {
            init();
        } else {
            resize();
            ctx.fillStyle = 'rgba(245, 158, 11, 0.03)';
            ctx.fillRect(0, 0, width, height);
            updateTimestamp();
            pathEl.textContent = window.location.pathname || '/unknown';
        }
    </script>
</body>

</html>
