<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连接监控 - 服务器监控面板</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="logo">
                <h1>📊 服务器监控面板</h1>
            </div>
            <div class="server-status">
                <span class="status-indicator" id="serverStatus"></span>
                <span id="serverStatusText">连接中...</span>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <span class="label">运行时间</span>
                    <span class="value" id="uptime">00:00:00</span>
                </div>
                <div class="stat-item">
                    <span class="label">当前时间</span>
                    <span class="value" id="currentTime">--:--:--</span>
                </div>
            </div>
        </header>

        <nav class="dashboard-nav">
            <a href="/" class="nav-item">概览</a>
            <a href="/connections.html" class="nav-item active">连接监控</a>
            <a href="/performance.html" class="nav-item">性能分析</a>
            <a href="/traffic.html" class="nav-item">流量统计</a>
        </nav>

        <main class="dashboard-main">
            <section class="connection-summary">
                <div class="summary-card">
                    <div class="summary-icon">🔗</div>
                    <div class="summary-content">
                        <span class="summary-value" id="activeConnections">0</span>
                        <span class="summary-label">活动连接</span>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="summary-icon">📊</div>
                    <div class="summary-content">
                        <span class="summary-value" id="totalConnections">0</span>
                        <span class="summary-label">总连接数</span>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="summary-icon">🔒</div>
                    <div class="summary-content">
                        <span class="summary-value" id="sslConnections">0</span>
                        <span class="summary-label">SSL连接</span>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="summary-icon">❌</div>
                    <div class="summary-content">
                        <span class="summary-value" id="connectionErrors">0</span>
                        <span class="summary-label">连接错误</span>
                    </div>
                </div>
            </section>

            <section class="connections-table-section">
                <div class="table-header">
                    <h3>活动连接详情</h3>
                    <div class="table-controls">
                        <input type="text" id="searchInput" placeholder="搜索IP或路径...">
                        <select id="filterSelect">
                            <option value="all">全部</option>
                            <option value="ssl">仅SSL</option>
                            <option value="http">仅HTTP</option>
                        </select>
                        <button onclick="refreshConnections()">🔄 刷新</button>
                    </div>
                </div>
                <div class="connections-table-wrapper">
                    <table class="connections-table full-table">
                        <thead>
                            <tr>
                                <th>客户端IP</th>
                                <th>端口</th>
                                <th>请求路径</th>
                                <th>User Agent</th>
                                <th>连接时间</th>
                                <th>最后活动</th>
                                <th>发送字节</th>
                                <th>接收字节</th>
                                <th>请求数</th>
                                <th>SSL</th>
                            </tr>
                        </thead>
                        <tbody id="connectionsTable"></tbody>
                    </table>
                </div>
                <div class="table-footer">
                    <span>显示 <span id="showingCount">0</span> 条记录</span>
                </div>
            </section>

            <section class="connection-stats">
                <div class="stats-card">
                    <h3>连接统计</h3>
                    <div class="stats-grid">
                        <div class="stat-row">
                            <span class="stat-label">平均每连接请求数:</span>
                            <span class="stat-value" id="avgRequestsPerConn">0</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">平均每连接发送:</span>
                            <span class="stat-value" id="avgSentPerConn">0 B</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">平均每连接接收:</span>
                            <span class="stat-value" id="avgReceivedPerConn">0 B</span>
                        </div>
                        <div class="stat-row">
                            <span class="stat-label">平均连接时长:</span>
                            <span class="stat-value" id="avgConnDuration">0s</span>
                        </div>
                    </div>
                </div>

                <div class="stats-card">
                    <h3>热门路径</h3>
                    <div id="topPaths"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/dashboard.js"></script>
    <script>
        let allConnections = [];

        function refreshConnections() {
            fetchConnections();
        }

        function updateConnectionsStats(connections) {
            if (!connections || connections.length === 0) return;

            allConnections = connections;

            document.getElementById('activeConnections').textContent = connections.length;
            document.getElementById('showingCount').textContent = connections.length;

            const totalSent = connections.reduce((sum, c) => sum + (c.bytes_sent || 0), 0);
            const totalReceived = connections.reduce((sum, c) => sum + (c.bytes_received || 0), 0);
            const totalRequests = connections.reduce((sum, c) => sum + (c.request_count || 0), 0);
            const sslCount = connections.filter(c => c.is_ssl).length;

            document.getElementById('sslConnections').textContent = sslCount;

            if (connections.length > 0) {
                document.getElementById('avgRequestsPerConn').textContent =
                    (totalRequests / connections.length).toFixed(1);
                document.getElementById('avgSentPerConn').textContent =
                    formatBytes(totalSent / connections.length);
                document.getElementById('avgReceivedPerConn').textContent =
                    formatBytes(totalReceived / connections.length);
            }

            const pathCounts = {};
            connections.forEach(conn => {
                const path = conn.request_path || '/';
                pathCounts[path] = (pathCounts[path] || 0) + 1;
            });

            const sortedPaths = Object.entries(pathCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            const topPathsHtml = sortedPaths.map(([path, count]) => `
                <div class="top-path-item">
                    <span class="path">${path}</span>
                    <span class="count">${count}</span>
                </div>
            `).join('');

            document.getElementById('topPaths').innerHTML = topPathsHtml || '<p class="no-data">暂无数据</p>';

            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            const filterSelect = document.getElementById('filterSelect').value;

            let filteredConnections = connections;

            if (searchInput) {
                filteredConnections = filteredConnections.filter(conn =>
                    (conn.client_ip && conn.client_ip.toLowerCase().includes(searchInput)) ||
                    (conn.request_path && conn.request_path.toLowerCase().includes(searchInput))
                );
            }

            if (filterSelect === 'ssl') {
                filteredConnections = filteredConnections.filter(conn => conn.is_ssl);
            } else if (filterSelect === 'http') {
                filteredConnections = filteredConnections.filter(conn => !conn.is_ssl);
            }

            const tbody = document.getElementById('connectionsTable');
            tbody.innerHTML = filteredConnections.map(conn => {
                const connectTime = new Date(conn.connect_time || Date.now());
                const lastActive = new Date(conn.last_active || Date.now());
                const duration = Math.floor((Date.now() - connectTime.getTime()) / 1000);

                return `
                    <tr>
                        <td><code>${conn.client_ip || '-'}</code></td>
                        <td>${conn.client_port || 0}</td>
                        <td class="path-cell">${conn.request_path || '-'}</td>
                        <td class="ua-cell">${conn.user_agent || '-'}</td>
                        <td>${connectTime.toLocaleTimeString('zh-CN')}</td>
                        <td>${lastActive.toLocaleTimeString('zh-CN')}</td>
                        <td>${formatBytes(conn.bytes_sent || 0)}</td>
                        <td>${formatBytes(conn.bytes_received || 0)}</td>
                        <td>${conn.request_count || 0}</td>
                        <td>${conn.is_ssl ? '🔒' : '-'}</td>
                    </tr>
                `;
            }).join('');

            if (filteredConnections.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="no-data">暂无连接数据</td></tr>';
            }
        }

        document.getElementById('searchInput').addEventListener('input', () => {
            updateConnectionsStats(allConnections);
        });

        document.getElementById('filterSelect').addEventListener('change', () => {
            updateConnectionsStats(allConnections);
        });

        setInterval(async function () {
            try {
                const response = await fetch('/api/connections/active');
                const data = await response.json();
                updateConnectionsStats(data.connections);
            } catch (e) {
                console.error('获取连接列表失败:', e);
            }
        }, 2000);
    </script>
</body>

</html>
