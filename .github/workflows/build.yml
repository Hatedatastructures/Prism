name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          version: 13.2.0
          platform: x64
          static: false

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G "MinGW Makefiles"

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure
        continue-on-error: true

      - name: Create Archive
        run: |
          mkdir -p release
          cp build/src/Prism.exe release/
          cd release && 7z a -tzip prism-windows-x64.zip Prism.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism-windows-x64
          path: release/prism-windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y build-essential cmake g++-14 nasm

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure
        continue-on-error: true

      - name: Create Archive
        run: |
          mkdir -p release
          cp build/src/Prism release/
          cd release && tar -czvf prism-linux-x64.tar.gz Prism

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: prism-linux-x64
          path: release/prism-linux-x64.tar.gz

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/prism-windows-x64/prism-windows-x64.zip
            artifacts/prism-linux-x64/prism-linux-x64.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}