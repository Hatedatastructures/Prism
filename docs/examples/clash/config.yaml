# 全局端口设置
mixed-port: 7890
socks-port: 7891
allow-lan: true                # 允许局域网连接（手机可通过局域网IP连接）
bind-address: '*'              # 监听所有网卡
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# DNS 设置
# 测试：当前开发环境没有ipv6，只能使用v4
dns:
  enable: true                  # 启用 Clash 内置 DNS
  ipv6: false                   # 禁止查询 AAAA 记录，只返回 IPv4 地址，避免客户端把 IPv6 地址发给代理导致连接失败
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # fallback:
  #   - https://1.1.1.1/dns-query
  #   - https://dns.google/dns-query
  # fallback-filter:
  #   geoip: true  # 现在禁用掉，避免误伤国内IP导致无法访问国内站点
  #   geoip-code: CN

# ---------- 协议测试节点 ----------
proxies:
  - name: "Smux Unlimited Conn Unlimited Streams TCP"
    type: trojan
    server: 192.168.137.1
    port: 8081
    password: "prism"
    udp: false
    skip-cert-verify: true
    smux:
      enabled: true
      protocol: smux
      only-tcp: true 

  - name: "Smux Unlimited Conn Unlimited Streams UDP"
    type: trojan
    server: 192.168.137.1
    port: 8081
    password: "prism"
    udp: false
    skip-cert-verify: true
    smux:
      enabled: true
      protocol: smux
      only-tcp: false 

  - name: "Smux 4 Conn 64 Streams TCP"
    type: trojan
    server: 192.168.137.1
    port: 8081
    password: "prism"
    udp: false
    skip-cert-verify: true
    smux:
      enabled: true
      protocol: smux
      only-tcp: true              
      max-streams: 64             
      max-conn: 4

  - name: "Smux 4 Conn 64 Streams UDP"
    type: trojan
    server: 192.168.137.1
    port: 8081
    password: "prism"
    udp: false
    skip-cert-verify: true
    smux:
      enabled: true
      protocol: smux
      only-tcp: false              
      max-streams: 64             
      max-conn: 4

  - name: "Smux 1 Conn 256 Streams TCP"
    type: trojan
    server: 192.168.137.1
    port: 8081
    password: "prism"
    udp: false
    skip-cert-verify: true
    smux:
      enabled: true
      protocol: smux
      only-tcp: true              
      max-streams: 256             
      max-conn: 1   

  - name: "Smux 1 Conn 256 Streams UDP"
    type: trojan
    server: 192.168.137.1
    port: 8081
    password: "prism"
    udp: false
    skip-cert-verify: true
    smux:
      enabled: true
      protocol: smux
      only-tcp: false              
      max-streams: 256             
      max-conn: 1   


  # SOCKS5 代理
  - name: "SOCKS5 UDP"         
    type: socks5
    server: 192.168.137.1
    port: 8081
    udp: true

  - name: "SOCKS5 TCP"         
    type: socks5
    server: 192.168.137.1
    port: 8081
    udp: false

  # http
  - name: "Http"
    type: http
    server: 192.168.137.1
    port: 8081


  # https
  - name: "Https"
    type: http
    server: 192.168.137.1
    port: 8081
    # username: username
    # password: password
    tls: true 
    # skip-cert-verify: true
    # sni: custom.com

  - name: "Trojan"          
    type: trojan
    server: 192.168.137.1
    port: 8081
    password: "prism"
    udp: false
    skip-cert-verify: true               


# ---------- 策略组 ----------
proxy-groups:
  - name: "Prism 协议测试"
    type: select
    proxies:
      - "Smux Unlimited Conn Unlimited Streams TCP"
      - "Smux Unlimited Conn Unlimited Streams UDP"
      - "Smux 4 Conn 64 Streams TCP"
      - "Smux 4 Conn 64 Streams UDP"
      - "Smux 1 Conn 256 Streams TCP"
      - "Smux 1 Conn 256 Streams UDP"
      - "SOCKS5 TCP"
      - "SOCKS5 UDP"
      - "Http"
      - "Https"
      - "Trojan"

  - name: "自动选择"
    type: url-test
    proxies:
      - "Smux Unlimited Conn Unlimited Streams TCP"
      - "Smux Unlimited Conn Unlimited Streams UDP"
      - "Smux 4 Conn 64 Streams TCP"
      - "Smux 4 Conn 64 Streams UDP"
      - "Smux 1 Conn 256 Streams TCP"
      - "Smux 1 Conn 256 Streams UDP"
      - "SOCKS5 TCP"
      - "SOCKS5 UDP"
      - "Http"
      - "Https"
      - "Trojan"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

# ---------- 规则 ----------
rules:
  # 阻止访问 IPv6 网站（当前开发环境没有 IPv6，避免一直 warning 一直输出连接失败）
  - IP-CIDR6,::/0,REJECT
  # 局域网直连（避免代理回环）
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT

  - MATCH,Prism 协议测试
