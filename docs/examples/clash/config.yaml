# 全局端口设置
mixed-port: 7890
socks-port: 7891
allow-lan: true                # 允许局域网连接（手机可通过局域网IP连接）
bind-address: '*'              # 监听所有网卡
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# DNS 设置
# 测试：当前开发环境没有ipv6，只能使用v4
dns:
  enable: true                  # 启用 Clash 内置 DNS
  ipv6: false                   # 禁止查询 AAAA 记录，只返回 IPv4 地址，避免客户端把 IPv6 地址发给代理导致连接失败
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # fallback:
  #   - https://1.1.1.1/dns-query
  #   - https://dns.google/dns-query
  # fallback-filter:
  #   geoip: true  # 现在禁用掉，避免误伤国内IP导致无法访问国内站点
  #   geoip-code: CN

# ---------- 代理节点 ----------
proxies:
  # Trojan 代理（运行在 192.168.137.1:8081）
  - name: "🏠 局域网 Trojan"          # 名称与策略组引用一致
    type: trojan
    server: 192.168.137.1
    port: 8081
    password: "forward-engine"
    udp: false
    skip-cert-verify: true

  # Trojan + smux 多路复用（复用单条 TLS 连接承载多个子流）
  - name: "🏠 局域网 Trojan Mux"
    type: trojan
    server: 192.168.137.1
    port: 8081
    password: "forward-engine"
    udp: false
    skip-cert-verify: true
    smux:
      enabled: true
      protocol: smux
      only-tcp: true                 # 禁用 UDP，UDP 连接直接走底层协议
      # max-streams: 32              # 单 mux 会话最大子流数
      # max-conn: 4                  # 同时保持的 mux 连接数

  # SOCKS5 代理（运行在 192.168.137.1:8081）
  - name: "🏠 局域网 SOCKS5"          # 名称与策略组引用一致
    type: socks5
    server: 192.168.137.1
    port: 8081
    # username: your-user
    # password: your-pass
    udp: true
  # http
  - name: "http"
    type: http
    server: 192.168.137.1
    port: 8081
  # https
  - name: "https"
    type: http
    server: 192.168.137.1
    port: 8081
    # username: username
    # password: password
    tls: true 
    # skip-cert-verify: true
    # sni: custom.com

# ---------- 策略组 ----------
proxy-groups:
  - name: "🚀 forward 代理测试"
    type: select
    proxies:
      - "🏠 局域网 Trojan"
      - "🏠 局域网 Trojan Mux"
      - "🏠 局域网 SOCKS5"
      - "http"
      - "https"

  - name: "⚡ 自动"
    type: url-test
    proxies:
      - "🏠 局域网 Trojan"
      - "🏠 局域网 Trojan Mux"
      - "🏠 局域网 SOCKS5"
      - "http"
      - "https"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

# ---------- 规则 ----------
rules:
  # 阻止访问 IPv6 网站（当前开发环境没有 IPv6，避免一直 warning 一直输出连接失败）
  - IP-CIDR6,::/0,REJECT
  # 局域网直连（避免代理回环）
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT

  # 默认规则：所有未匹配流量走“🚀 forward 代理测试”策略组
  - MATCH,🚀 forward 代理测试
