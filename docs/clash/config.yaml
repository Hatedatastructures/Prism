    sni: "www.bing.com"

  # SS2022 (Shadowsocks 2022 / SIP022)
  # SS2022 直接走裸 TCP（mihomo 不支持 SS2022 + tls: true）
  # 要套 TLS 需使用 plugin: shadow-tls 或 plugin: restls
  # cipher 必须使用 2022-blake3-aes-128-gcm 或 2022-blake3-aes-256-gcm
  # password 为 base64 编码的随机密钥（16 字节对应 AES-128，32 字节对应 AES-256）
  - name: "SS2022 TCP"
    type: ss
    server: 127.0.0.1
    port: 8081
    cipher: 2022-blake3-aes-128-gcm
    password: "5n5ESu953i/pjIp02oZvHA=="

  # SS2022 + ShadowTLS (SS2022 嵌入 ShadowTLS v3 的 TLS 伪装层)
  # ShadowTLS 通过 HMAC-SHA1 认证，将 SS2022 流量包装成标准 TLS 连接
  # SNI 必须与服务端 server_names 配置一致: www.apple.com
  # 注意: client-fingerprint 在代理顶层（用于 TLS 指纹伪装）
  #       plugin-opts 中不要放 fingerprint（那是用于证书 pinning 的）
  - name: "SS2022 ShadowTLS TCP"
    type: ss
    server: 127.0.0.1
    port: 8081
    cipher: 2022-blake3-aes-128-gcm
    password: "5n5ESu953i/pjIp02oZvHA=="
    plugin: shadow-tls
    plugin-opts:
      host: "www.apple.com"              # SNI: 与服务端 server_names 一致
      password: "shadowtls_password"      # HMAC 密码: 与服务端 users.password 一致
      version: 3

  - name: "SS2022 ShadowTLS UDP"
    type: ss
    server: 127.0.0.1
    port: 8081
    cipher: 2022-blake3-aes-128-gcm
    password: "5n5ESu953i/pjIp02oZvHA=="
    plugin: shadow-tls
    plugin-opts:
      host: "www.apple.com"              # SNI: 与服务端 server_names 一致
      password: "shadowtls_password"      # HMAC 密码: 与服务端 users.password 一致
      version: 3

  # Trojan + ShadowTLS (Trojan 嵌入 ShadowTLS v3 的 TLS 伪装层)
  # 验证 ShadowTLS 伪装层与非 SS2022 内层协议的兼容性
  - name: "Trojan ShadowTLS TCP"
    type: trojan
    server: 127.0.0.1
    port: 8081
    password: "prism"
    skip-cert-verify: true
    plugin: shadow-tls
    plugin-opts:
      host: "www.apple.com"
      password: "shadowtls_password"
      version: 3

  - name: "Trojan ShadowTLS UDP"
    type: trojan
    server: 127.0.0.1
    port: 8081
    password: "prism"
    skip-cert-verify: true
    udp: true
    plugin: shadow-tls
    plugin-opts:
      host: "www.apple.com"
      password: "shadowtls_password"
      version: 3

  # SS2022 + Restls TLS13 (SS2022 嵌入 Restls 的 TLS 1.3 伪装层)
  # Restls 通过 TLS 应用数据中的认证信息验证客户端
  # restls-script 用于控制握手后的流量模式，隐藏代理特征
  # SNI 必须与服务端 server_names 配置一致: www.nvidia.com
  - name: "SS2022 Restls TLS13 TCP"
    type: ss
    server: 127.0.0.1
    port: 8081
    cipher: 2022-blake3-aes-128-gcm
    password: "5n5ESu953i/pjIp02oZvHA=="
    plugin: restls
    plugin-opts:
      host: "www.nvidia.com"             # SNI: 与服务端 server_names 一致
      password: "restls_password"        # 认证密码: 与服务端 password 一致
      version-hint: "tls13"
      restls-script: "300?100<1,400~100,350~100,600~100,300~200,300~100"

  - name: "SS2022 Restls TLS13 UDP"
    type: ss
    server: 127.0.0.1
    port: 8081
    cipher: 2022-blake3-aes-128-gcm
    password: "5n5ESu953i/pjIp02oZvHA=="
