# 全局端口设置
mixed-port: 7890
socks-port: 7891
allow-lan: true                # 允许局域网连接（手机可通过局域网IP连接）
bind-address: '*'              # 监听所有网卡
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
global-client-fingerprint: none  # 禁用全局 uTLS 指纹模拟，ShadowTLS 需要标准 TLS

# DNS 设置
# 测试：当前开发环境没有ipv6，只能使用v4
dns:
  enable: true                  # 启用 Clash 内置 DNS
  ipv6: false                   # 禁止查询 AAAA 记录，只返回 IPv4 地址，避免客户端把 IPv6 地址发给代理导致连接失败
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # fallback:
  #   - https://1.1.1.1/dns-query
  #   - https://dns.google/dns-query
  # fallback-filter:
  #   geoip: true  # 现在禁用掉，避免误伤国内IP导致无法访问国内站点
  #   geoip-code: CN

# ---------- SNI 路由说明 ----------
# Prism 使用 SNI 路由表进行协议识别：
#   - www.microsoft.com   → Reality
#   - www.apple.com       → ShadowTLS
#   - www.nvidia.com      → Restls
#   - www.cloudflare.com  → AnyTLS
#   - www.amazon.com      → TrustTunnel
#
# 每个协议使用不同的 SNI，确保单端口多协议确定性识别。
# 所有 SNI 都是真实可访问的大厂域名，支持主动探测回退。
# 客户端 sni/servername 必须与服务端 server_names 配置一致！

