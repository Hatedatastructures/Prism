# 全局端口设置
mixed-port: 7890
socks-port: 7891
allow-lan: true                # 允许局域网连接（手机可通过局域网IP连接）
bind-address: '*'              # 监听所有网卡
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# DNS 设置（如需使用请补全 nameserver，否则设为 false）
dns:
  enable: false                 # 暂时关闭 DNS 避免干扰

# ---------- 代理节点 ----------
proxies:
  # Trojan 代理（运行在 192.168.137.1:8081）
  - name: "🏠 局域网 Trojan"          # 名称与策略组引用一致
    type: trojan
    server: 192.168.137.1
    port: 8081
    password: "forward-engine"
    udp: false
    skip-cert-verify: true

  # SOCKS5 代理（运行在 192.168.137.1:8081）
  - name: "🏠 局域网 SOCKS5"          # 名称与策略组引用一致
    type: socks5
    server: 192.168.137.1
    port: 8081
    # username: your-user
    # password: your-pass
    udp: true

# ---------- 策略组 ----------
proxy-groups:
  - name: "🚀 我的代理"
    type: select
    proxies:
      - "🏠 局域网 Trojan"
      - "🏠 局域网 SOCKS5"

  - name: "⚡ 自动优选"
    type: url-test
    proxies:
      - "🏠 局域网 Trojan"
      - "🏠 局域网 SOCKS5"
    url: "http://www.gstatic.com/generate_204"
    interval: 300

# ---------- 规则 ----------
rules:
  # 局域网直连（避免代理回环）
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT

  # 默认规则：所有未匹配流量走“🚀 我的代理”策略组
  - MATCH,🚀 我的代理